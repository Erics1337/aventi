name: CI

on:
  push:
    branches: [main, master, 'codex/**']
  pull_request:

jobs:
  monorepo-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile=false

      - name: JS typecheck (scaffold)
        run: pnpm typecheck || true

  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync backend dependencies
        run: uv sync --project services/backend --extra dev

      - name: Run backend tests (scaffold)
        run: uv run --project services/backend pytest || true
